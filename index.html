<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>席次表PowerPoint変換ツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>席次表 → PowerPoint 変換</h1>
            <p class="subtitle">PDF・JPEG・PNG をスライドに変換します（16:9 / レイアウト維持）</p>
        </header>

        <main>
            <div id="dropZone" class="drop-zone">
                <div class="drop-zone-inner">
                    <svg class="upload-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <p class="drop-text">ここにファイルをドラッグ＆ドロップ</p>
                    <p class="drop-subtext">または</p>
                    <button id="selectBtn" class="btn-primary">ファイルを選択</button>
                    <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" multiple hidden>
                    <p class="drop-hint">対応形式: PDF / JPEG / PNG（複数選択可）</p>
                </div>
            </div>

            <div id="fileList" class="file-list" style="display:none;">
                <h2>選択されたファイル</h2>
                <ul id="fileListItems"></ul>

                <div class="filename-inputs">
                    <div class="input-group">
                        <label for="dateSelect">日付</label>
                        <div class="date-wrap">
                            <select id="dateSelect" class="select-input" title="土日から選択"></select>
                            <span class="date-other-label">その他の日付を選択 →</span>
                            <button type="button" id="dateIconBtn" class="date-icon-btn" title="カレンダーから選ぶ" aria-label="カレンダーを開く">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                    <line x1="16" y1="2" x2="16" y2="6"/>
                                    <line x1="8" y1="2" x2="8" y2="6"/>
                                    <line x1="3" y1="10" x2="21" y2="10"/>
                                </svg>
                            </button>
                            <input type="date" id="dateCustom" class="date-input-hidden" tabindex="-1" aria-hidden="true">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="customerName">ご両家名</label>
                        <div class="name-wrap">
                            <input type="text" id="customerName" class="text-input" placeholder="例: 井本・近藤" autocomplete="off">
                            <span class="name-suffix">家</span>
                        </div>
                    </div>
                    <p class="filename-preview">ファイル名: <span id="filenamePreview">—</span></p>
                </div>

                <div class="actions">
                    <button id="convertBtn" class="btn-primary btn-large" disabled>PowerPointに変換</button>
                    <button id="clearBtn" class="btn-secondary">クリア</button>
                </div>
            </div>

            <div id="progress" class="progress" style="display:none;">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <p id="progressText" class="progress-text">準備中...</p>
            </div>

            <div id="result" class="result" style="display:none;">
                <svg class="check-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
                <p class="result-text">変換完了！ダウンロードが始まります。</p>
                <button id="resetBtn" class="btn-secondary">続けて別のファイルを変換</button>
            </div>
        </main>

        <footer>
            <p class="privacy-note">
                ファイルはお使いのブラウザ内で処理されます。サーバーには一切アップロードされません。
            </p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs" type="module"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@v3.12.0/dist/pptxgen.bundle.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
